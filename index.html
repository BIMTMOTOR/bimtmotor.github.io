<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIMT WORLD 企业官网</title>
    <style>
        /* 重置内外边距，让页面充满全屏 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b1a2f;          /* 深蓝黑色背景，显得稳重大气 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', 'Helvetica', sans-serif;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        /* 主标题：巨幅、加粗、金属渐变 */
        .main-title {
            font-size: clamp(4rem, 15vw, 10rem);   /* 自适应大小 */
            font-weight: 900;
            background: linear-gradient(135deg, #f0e68c, #ffd700, #f0e68c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            margin-bottom: 0.2em;
        }

        /* 副标题：柔和亮色，略小 */
        .sub-title {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 300;
            color: #aad0f5;
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(170, 208, 245, 0.2);
            border-top: 2px solid rgba(255, 215, 0, 0.3);
            display: inline-block;
            padding-top: 0.3em;
        }

        /* 装饰性小点缀（可选） */
        .tagline {
            margin-top: 3rem;
            font-size: 1rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">WELCOME BIMT WORLD</h1>
        <div class="sub-title">Make Better Happen</div>
        <!-- 底部可加一句企业口号（可不加） -->
        <div class="tagline">? 卓越 · 创新 · 共赢 ?</div>
    </div>
</body>
</html>
