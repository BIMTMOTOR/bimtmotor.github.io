<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIMT MOTOR</title>
    <meta name="description" content="BIMT MOTOR - Make Better Happen" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* 亮眼希望渐变：蓝→青→紫 */
            background: linear-gradient(145deg, #00c6ff 0%, #0072ff 40%, #a18cd1 100%);
            text-align: center;
            overflow: hidden;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.15);
        }

        .section {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 0 20px;
        }

        /* 上部：flex列，底部对齐 */
        .section-top {
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 0.3em;
        }

        /* 中部：居中 */
        .section-middle {
            align-items: center;
        }

        /* 下部：flex列，顶部对齐 */
        .section-bottom {
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 0.3em;
        }

        /* 所有文本：不换行，加粗，居中 */
        .section span {
            display: block;
            white-space: nowrap;
            font-weight: 700; /* 全部加粗 */
            line-height: 1.2;
            margin: 0 auto;   /* 水平居中 */
        }

        /* 组1：WELCOME TO 和 Make Better Happen 宽度一致 */
        .top-line1,
        .bottom-text {
            width: 75%;
        }

        /* 组2：BIMT WORLD 和 BIMT MOTOR BETTER WORK 宽度一致 */
        .top-line2,
        .middle-text {
            width: 90%;
        }

        /* 独立字体大小 */
        .top-line1 {
            font-size: clamp(1.2rem, 4vw, 2.8rem);
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.85);
        }

        .top-line2 {
            font-size: clamp(3rem, 12vw, 7rem);
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #fff7b0, #ffe066);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 4px 20px rgba(255, 215, 0, 0.3));
        }

        .middle-text {
            font-size: clamp(1.6rem, 5vw, 3.8rem);
            letter-spacing: 0.08em;
            color: #ffffff;
            text-shadow: 0 2px 30px rgba(0, 0, 0, 0.2);
        }

        .bottom-text {
            font-size: clamp(1.2rem, 3.5vw, 2.6rem);
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.15);
        }

        /* 极窄屏微调，放宽宽度以防溢出 */
        @media (max-width: 360px) {
            .top-line1,
            .bottom-text {
                width: 85%;
            }
            .top-line2,
            .middle-text {
                width: 95%;
            }
            .top-line1 { font-size: 1rem; }
            .top-line2 { font-size: 2.2rem; }
            .middle-text { font-size: 1.2rem; }
            .bottom-text { font-size: 1rem; }
        }

        /* 超宽屏 */
        @media (min-width: 1920px) {
            .top-line1 { font-size: 3rem; }
            .top-line2 { font-size: 8rem; }
            .middle-text { font-size: 4.2rem; }
            .bottom-text { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <!-- 上部 -->
    <div class="section section-top">
        <span class="top-line1">WELCOME TO</span>
        <span class="top-line2">BIMT WORLD</span>
    </div>

    <!-- 中部 -->
    <div class="section section-middle">
        <span class="middle-text">BIMT MOTOR BETTER WORK</span>
    </div>

    <!-- 下部 -->
    <div class="section section-bottom">
        <span class="bottom-text">Make Better Happen</span>
    </div>
</body>
</html>
