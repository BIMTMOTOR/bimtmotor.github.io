<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIMT MOTOR Robot Motor</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #e6f2ff; /* 很浅的天蓝色 */
            color: #1a3a4a;
            padding: 20px;
            /* 让内容填满高度 */
        }

        /* 左上角区域：LOGO + 广告语 */
        .header-left {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap; /* 手机换行 */
            margin-bottom: 10px;
        }

        .logo {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 900;
            color: #0072ff;
            letter-spacing: 1px;
        }

        .slogan {
            font-size: clamp(0.9rem, 2vw, 1.6rem);
            font-weight: 300;
            color: #2a5f7a;
            letter-spacing: 0.08em;
            opacity: 0.8;
        }

        /* 中间内容：垂直居中 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px 0;
        }

        /* 欢迎语两行 */
        .welcome-line1 {
            font-size: clamp(1.8rem, 6vw, 4rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            color: #1a4a5e;
            margin-bottom: 0.1em;
        }

        .welcome-line2 {
            font-size: clamp(3.2rem, 12vw, 8rem);
            font-weight: 900;
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.04em;
            margin-bottom: 0.4em;
        }

        /* 按钮样式 */
        .btn {
            display: inline-block;
            padding: 16px 40px;
            font-size: clamp(1.2rem, 3vw, 2.2rem);
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.06em;
            box-shadow: 0 8px 30px rgba(0, 114, 255, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 114, 255, 0.4);
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* 底部版权，居中 */
        .footer {
            text-align: center;
            font-size: clamp(0.7rem, 1.2vw, 1rem);
            color: #5a7a8a;
            letter-spacing: 0.05em;
            padding: 15px 0 5px;
            border-top: 1px solid rgba(0, 114, 255, 0.1);
            margin-top: 20px;
        }

        /* 响应式微调：手机下按钮宽度自适应 */
        @media (max-width: 480px) {
            .btn {
                width: 80%;
                max-width: 300px;
                padding: 14px 20px;
            }
            .header-left {
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- 左上角 LOGO + 广告语 -->
    <div class="header-left">
        <span class="logo">BIMT</span>
        <span class="slogan">Make Better Happen</span>
    </div>

    <!-- 中间内容：欢迎语 + 按钮 -->
    <div class="main-content">
        <div class="welcome-line1">WELCOME TO</div>
        <div class="welcome-line2">BIMT WORLD</div>
        <!-- 按钮，点击跳转到 home.html -->
        <a href="/home.html" class="btn">BIMT Motor Better Work</a>
    </div>

    <!-- 底部版权 -->
    <div class="footer">
        &copy; BETTER INTELLIGENT MANUFACTURING TECHNOLOGY CO., LTD
    </div>

</body>
</html>
